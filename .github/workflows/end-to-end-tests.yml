name: End-to-end tests

# Triggers the workflow on push or pull request events
on: [push, pull_request]

jobs:
  # Runs the Playwright end-to-end test suite against a wp-env WordPress
  # instance. Each matrix entry is an isolated environment (its own wp-env), so
  # the entries run in parallel safely even though the suite itself is serial
  # within a single shared instance.
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env_1: "Latest WordPress on PHP 7.4"
            php: "7.4"
            wp: "latest"
          - env_2: "Latest WordPress on PHP 8.0"
            php: "8.0"
            wp: "latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Log debug information
        run: |
          npm --version
          node --version
          docker -v
          php --version

      - name: Install NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Setup WordPress environment
        env:
          PHP_VERSION: ${{ matrix.php }}
          WP_VERSION: ${{ matrix.wp }}
        run: |
          if [[ $WP_VERSION == "latest" ]]; then
            echo "{ \"core\": null, \"plugins\": [\".\"], \"phpVersion\": \"$PHP_VERSION\" }" > .wp-env.override.json
          else
            echo "{ \"core\": \"WordPress/WordPress#$WP_VERSION\", \"plugins\": [\".\"], \"phpVersion\": \"$PHP_VERSION\" }" > .wp-env.override.json
          fi
          cat .wp-env.override.json

      - name: Start WordPress environment and seed fixtures
        run: make e2e-prepare

      - name: Log WordPress version
        run: npx wp-env run cli wp core version

      - name: Run Playwright e2e tests
        env:
          # Prevent Playwright from attaching an accessibility tree of a failed
          # page; auth and post-hack pages can contain credentials or salts.
          PLAYWRIGHT_NO_COPY_PROMPT: "1"
        run: npx playwright test
